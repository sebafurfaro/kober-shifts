services:
  # Next.js Application (variables de Google/NextAuth: copiá .env.local a .env o definí .env)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/kober_shifts
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=kober_user
      - MYSQL_PASSWORD=kober_password
      - MYSQL_DATABASE=kober_shifts
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_STORE_REDIRECT_URI=${GOOGLE_STORE_REDIRECT_URI}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # MongoDB - Para datos flexibles
  mongodb:
    image: mongo:7
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_DATABASE=kober_shifts
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  # MySQL - Para datos estructurados
  mysql:
    image: mysql:8.0
    ports:
      - "3308:3306"
    command: ["mysqld", "--max-connections=500"]
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=kober_shifts
      - MYSQL_USER=kober_user
      - MYSQL_PASSWORD=kober_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  mongodb_data:
  mysql_data:


