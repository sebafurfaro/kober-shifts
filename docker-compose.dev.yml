services:
  # MongoDB - Para datos flexibles
  mongodb:
    image: mongo:7
    ports:
      - "27020:27017"
    environment:
      - MONGO_INITDB_DATABASE=kober_shifts
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/kober_shifts --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL - Para datos estructurados
  mysql:
    image: mysql:8.0
    ports:
      - "3309:3306"
    command: ["mysqld", "--max-connections=500"]
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=kober_shifts
      - MYSQL_USER=kober_user
      - MYSQL_PASSWORD=kober_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  mysql_data:

